<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizomaniya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../login.page/loginstyle.css">
</head>

<body>
    
    <div class="quiz-box">
        <div class="quiz-header">
            <h1>Welcome to Quizomaniya</h1>
        </div>
    </div>

    <div class="div-login">
        <form class="login-form">
            <h2>Login</h2>
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" onclick="login()">Login</button>
            <p class="message">Not registered? <a href="../signup.page/signup.html">Create an account</a></p>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 Quizomaniya. All rights reserved.</p>
    </footer>

    <script src="../login.page/loginscript.js"></script>
</body>

</html>
