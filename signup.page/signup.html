<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizomaniya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../signup.page/signupstyle.css">
</head>

<body>

    <div class="quiz-box">
        <div class="quiz-header">
            <h1>Welcome to Quizomaniya</h1>
        </div>
    </div>

    <div class="div-signup">
        <form class="signup-form">
            <h2>Signup</h2>
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" onclick="signup()">Signup</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 Quizomaniya. All rights reserved.</p>
    </footer>

    <script src="../signup.page/signupscript.js"></script>
</body>

</html>
